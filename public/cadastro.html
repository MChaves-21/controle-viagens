<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro - VoyageGest</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-container">
        <h1>Criar Conta</h1>
        <form id="cadastroForm">
            <div class="input-group"><label>Nome</label><input type="text" id="nome" required></div>
            <div class="input-group"><label>E-mail</label><input type="email" id="email" required></div>
            <div class="input-group"><label>Senha</label><input type="password" id="password" required></div>
            <button type="submit" class="btn-primary">Cadastrar</button>
            <div class="signup-link"><a href="login.html">Voltar ao Login</a></div>
        </form>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
