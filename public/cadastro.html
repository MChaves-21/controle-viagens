<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">
    <div class="container">
        <h2>Criar Conta</h2>
        <form id="cadastroForm">
            <div class="input-group"><label>Nome</label><input type="text" name="nome" required></div>
            <div class="input-group"><label>E-mail</label><input type="email" name="email" required></div>
            <div class="input-group"><label>Senha</label><input type="password" name="password" required></div>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
            <a href="login.html">Voltar ao login</a>
        </form>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
