<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Lançar Despesa - VoyageGest</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dashboard-layout">
    <header class="top-bar">
        <div><strong>VoyageGest</strong> > Lançar Despesa</div>
        <a href="dashboard.html" class="btn-logout" style="background:#4a5568">Voltar</a>
    </header>

    <main class="main-content">
        <div class="login-container" style="max-width: 600px; margin: 0 auto;">
            <h2>Lançar Despesa / Reembolso</h2>
            <form id="despesaForm">
                <div class="input-group">
                    <label>Valor (R$)</label>
                    <input type="number" step="0.01" id="valor" placeholder="0,00" required>
                </div>
                <div class="input-group">
                    <label>Data de Vencimento</label>
                    <input type="date" id="data_vencimento" required>
                </div>
                <div class="input-group">
                    <label>Tipo de Despesa</label>
                    <select id="tipo_titulo_id" required style="width:100%; padding:10px; border-radius:5px;">
                        <option value="">Carregando tipos...</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Lançar Despesa</button>
            </form>
            <div id="message"></div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        async function carregarTiposDespesa() {
            const res = await fetch('/api/tipo-titulos');
            const tipos = await res.json();
            const select = document.getElementById('tipo_titulo_id');
            select.innerHTML = tipos.map(t => `<option value="${t.tipo_titulo_id}">${t.descricao}</option>`).join('');
        }
        carregarTiposDespesa();
    </script>
</body>

</html>
