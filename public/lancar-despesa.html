<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Lançar Despesa</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">
    <div class="container">
        <h2>Lançar Despesa</h2>
        <form id="despesaForm">
            <div class="input-group"><label>Valor</label><input type="number" name="valor" step="0.01" required></div>
            <div class="input-group"><label>Vencimento</label><input type="date" name="data_vencimento" required></div>
            <div class="input-group"><label>Tipo Título</label><select name="tipo_titulo_id" id="titulos"></select>
            </div>
            <button type="submit" class="btn btn-primary">Lançar</button>
            <a href="dashboard.html">Cancelar</a>
        </form>
    </div>
    <script src="js/main.js"></script>
    <script>
        fetch('/api/tipo-titulos').then(r => r.json()).then(data => {
            document.getElementById('titulos').innerHTML = data.map(t => `<option value="${t.tipo_titulo_id}">${t.descricao}</option>`).join('');
        });
    </script>
</body>

</html>
