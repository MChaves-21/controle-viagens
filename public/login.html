<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login - VoyageGest</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-container">
        <h1>VoyageGest</h1>
        <p>Gestão de Viagens</p>
        <form id="loginForm">
            <div class="input-group"><label>E-mail Corporativo</label><input type="email" id="email" required></div>
            <div class="input-group"><label>Senha</label><input type="password" id="password" required></div>
            <button type="submit" class="btn-primary">Entrar</button>
            <div class="signup-link">Não tem conta? <a href="cadastro.html">Cadastre-se</a></div>
        </form>
        <div id="message" class="error-message"></div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
