<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Solicitar Viagem</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">
    <div class="container">
        <h2>Solicitar Viagem</h2>
        <form id="viagemForm">
            <div class="input-group"><label>Data Ida</label><input type="date" name="data_ida" required></div>
            <div class="input-group"><label>Data Volta</label><input type="date" name="data_volta" required></div>
            <div class="input-group"><label>Tipo</label><select name="viagem_tipo_id" id="tipos"></select></div>
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="dashboard.html">Cancelar</a>
        </form>
    </div>
    <script src="js/main.js"></script>
    <script>
        fetch('/api/viagem-tipos').then(r => r.json()).then(data => {
            document.getElementById('tipos').innerHTML = data.map(t => `<option value="${t.viagem_tipo_id}">${t.descricao}</option>`).join('');
        });
    </script>
</body>

</html>
