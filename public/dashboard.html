<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dashboard-layout">
    <header class="header">
        <div>VoyageGest</div>
        <div id="userName"></div>
    </header>
    <main class="main">
        <div style="display:flex; justify-content:space-between">
            <h2>Minhas Viagens</h2>
            <div>
                <a href="solicitar-viagem.html" class="btn-success">Nova Viagem</a>
                <a href="lancar-despesa.html" class="btn-success" style="background:#2c5282">Lançar Despesa</a>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Data Ida</th>
                    <th>Data Volta</th>
                    <th>Tipo</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </main>
    <script>
        const u = JSON.parse(localStorage.getItem('user'));
        if (!u) window.location.href = 'login.html';
        document.getElementById('userName').innerText = `Olá, ${u.nome}`;
        async function load() {
            const res = await fetch('/api/viagens');
            const data = await res.json();
            document.getElementById('lista').innerHTML = data.map(v => `<tr><td>${v.viagem_id}</td><td>${v.data_ida.split('T')[0]}</td><td>${v.data_volta.split('T')[0]}</td><td>${v.tipo}</td></tr>`).join('');
        }
        load();
    </script>
</body>

</html>
